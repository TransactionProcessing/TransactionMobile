<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent rounded glass badge border -->
  <rect x="128" y="128" width="200" height="200" rx="48" ry="48"
        fill="white" fill-opacity="0.18"
        stroke="white" stroke-opacity="0.55" stroke-width="3"/>

  <!-- Payment card body outline -->
  <rect x="152" y="218" width="152" height="88" rx="12" ry="12"
        fill="none" stroke="white" stroke-width="6"/>

  <!-- Magnetic stripe across top of card -->
  <rect x="152" y="231" width="152" height="17"
        fill="white" fill-opacity="0.50"/>

  <!-- Three EMV chip indicator dots -->
  <circle cx="182" cy="277" r="8" fill="white" fill-opacity="0.80"/>
  <circle cx="228" cy="277" r="8" fill="white" fill-opacity="0.80"/>
  <circle cx="274" cy="277" r="8" fill="white" fill-opacity="0.80"/>

  <!-- Upward arrow above the card (transaction / send) -->
  <line x1="228" y1="212" x2="228" y2="168"
        stroke="white" stroke-width="8" stroke-linecap="round"/>
  <polyline points="208,186 228,166 248,186"
            fill="none" stroke="white" stroke-width="8"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
