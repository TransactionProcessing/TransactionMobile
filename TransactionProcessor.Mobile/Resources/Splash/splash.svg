<?xml version="1.0" encoding="UTF-8"?>
<!--
  Splash screen icon — payment-card + upward-arrow, drawn in white on a
  transparent background.  The background colour (#4267B2) is specified
  via the Color attribute of <MauiSplashScreen> in the .csproj so that
  MAUI fills the entire screen with the solid colour and centres this
  icon on top — preventing any stretching caused by aspect-ratio
  mismatches between the SVG and the device screen.

  Coordinates mirror ic_splash_icon.xml (Android 12+ windowSplashScreenAnimatedIcon)
  so both platforms show the same visual.
-->
<svg viewBox="0 0 108 108" xmlns="http://www.w3.org/2000/svg">

  <!-- Frosted-glass badge background -->
  <path fill="rgba(255,255,255,0.18)"
        d="M32,32 L76,32 Q84,32 84,40 L84,76 Q84,84 76,84 L32,84 Q24,84 24,76 L24,40 Q24,32 32,32 Z"/>

  <!-- Payment card outline -->
  <path fill="none" stroke="white" stroke-width="3.5"
        d="M36,57 L72,57 Q75,57 75,60 L75,78 Q75,81 72,81 L36,81 Q33,81 33,78 L33,60 Q33,57 36,57 Z"/>

  <!-- Magnetic stripe -->
  <rect x="33" y="61" width="42" height="7" fill="rgba(255,255,255,0.5)"/>

  <!-- Three EMV chip dots -->
  <circle cx="43" cy="71" r="4" fill="rgba(255,255,255,0.8)"/>
  <circle cx="54" cy="71" r="4" fill="rgba(255,255,255,0.8)"/>
  <circle cx="65" cy="71" r="4" fill="rgba(255,255,255,0.8)"/>

  <!-- Upward arrow stem -->
  <line x1="54" y1="52" x2="54" y2="34"
        stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Upward arrow head -->
  <polyline points="44,44 54,33 64,44"
            fill="none" stroke="white" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round"/>

</svg>
