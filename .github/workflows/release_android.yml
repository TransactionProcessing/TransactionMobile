name: Release Android

on:
  release:
    types: [published]

jobs:
  release_android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Extract version from tag
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          # Android versionCode must be a positive integer
          VERSION_CODE=$(( MAJOR * 1000000 + MINOR * 1000 + PATCH ))

          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "APP_ANDROID_VERSION=$VERSION_CODE" >> $GITHUB_ENV

      - name: Install KVM and Android SDK (x86)
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/emulator:$PATH

          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip
          unzip -q commandlinetools-linux-*.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          chmod +x $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager

          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-36"

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH" >> $GITHUB_ENV

      - name: Install Android Build Tools
        run: |
          sdkmanager "build-tools;36.0.0"
          sdkmanager --update

      - name: Install MAUI workloads
        run: |
          dotnet workload install maui-android

      - name: Restore packages
        run: dotnet restore TransactionProcessor.Mobile.sln --source ${{ secrets.PUBLICFEEDURL }} --source ${{ secrets.PRIVATEFEED_URL }} --source https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet6/nuget/v3/index.json

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > android_keystore.jks

      - name: Publish Android APK
        run: |
          dotnet publish TransactionProcessor.Mobile/TransactionProcessor.Mobile.csproj \
            -f net10.0-android \
            -c Release \
            --no-restore \
            /p:ApplicationDisplayVersion=${{ env.APP_VERSION }} \
            /p:ApplicationVersion=${{ env.APP_ANDROID_VERSION }} \
            /p:AndroidSigningKeyStore=$(pwd)/android_keystore.jks \
            /p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEY_ALIAS }} \
            /p:AndroidSigningKeyPass=${{ secrets.ANDROID_KEY_PASSWORD }} \
            /p:AndroidSigningStorePass=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Upload APK to release
        uses: softprops/action-gh-release@v1
        with:
          files: TransactionProcessor.Mobile/bin/Release/net10.0-android/*-Signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: TransactionProcessor.Mobile/bin/Release/net10.0-android/*-Signed.apk

      - name: Clean up keystore
        if: always()
        run: rm -f android_keystore.jks

  deploy_to_staging:
    needs: release_android
    runs-on: [self-hosted, windows]
    permissions:
      contents: read
    steps:
      - name: Download Android APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: android-apk

      - name: Copy Android APK to AppUpdates
        shell: powershell
        run: |
          $dest = "C:\inetpub\wwwroot\AppUpdates\Android"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "android-apk\*" -Destination $dest -Recurse -Force
          Write-Host "Copied Android APK to $dest"
