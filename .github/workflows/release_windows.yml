name: Release Windows

on:
  release:
    types: [published]

jobs:
  release_windows:
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Extract version from tag
        shell: powershell
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if ($tag -notmatch '^v?(\d{4})\.(\d{1,2})\.(\d{1,2})$') {
            Write-Error "Tag '$tag' does not match expected format vYYYY.M.D (e.g. v2026.4.1)"
            exit 1
          }
          $year  = [int]$Matches[1]
          $month = [int]$Matches[2]
          $day   = [int]$Matches[3]

          # Compute two-digit year and day-of-year
          $yearShort = $year - 2000
          $date      = Get-Date -Year $year -Month $month -Day $day
          $dayOfYear = $date.DayOfYear

          # Resizetizer-safe SemVer display version: YY.M.DOY  (e.g. 26.4.91)
          $displayVersion = "$yearShort.$month.$dayOfYear"

          # Valid MSIX/Appx package version: YYYY.M.D.0  (each part 0..65535)
          $msixVersion = "$year.$month.$day.0"

          echo "APP_DISPLAY_VERSION=$displayVersion" >> $env:GITHUB_ENV
          echo "APP_MSIX_VERSION=$msixVersion"       >> $env:GITHUB_ENV

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1
        with:
          vs-prerelease: true

      - name: Setup .NET SDK (10.x)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Dotnet info
        run: |
          dotnet --info
          dotnet --list-sdks
          dotnet --list-runtimes

      - name: Install MAUI workloads
        run: |
          dotnet workload install maui

      - name: Restore packages
        run: dotnet restore TransactionProcessor.Mobile.sln --source ${{ secrets.PUBLICFEEDURL }} --source ${{ secrets.PRIVATEFEED_URL }} --source https://api.nuget.org/v3/index.json

      - name: Decrypt PFX File
        run: |
          echo "${{ secrets.WINDOWSSIGNINGCERT }}" > cert.pfx.asc
          certutil -decode cert.pfx.asc cert.pfx

      - name: Add Cert to Store
        run: certutil -user -q -p ${{ secrets.WINDOWSSIGNINGCERTPWD }} -importpfx cert.pfx NoRoot

      - name: Publish Windows App
        run: |
          dotnet publish TransactionProcessor.Mobile/TransactionProcessor.Mobile.csproj `
            -c Release `
            -f net10.0-windows10.0.19041.0 `
            /p:ApplicationDisplayVersion=${{ env.APP_DISPLAY_VERSION }} `
            /p:ApplicationVersion=${{ env.APP_MSIX_VERSION }} `
            /p:AppxPackageSigningEnabled=true `
            /p:PackageCertificateThumbprint="${{ secrets.WINDOWSSIGNINGCERTTHUMBPRINT }}"

      - name: Find MSIX package
        shell: powershell
        run: |
          $msix = Get-ChildItem -Path "TransactionProcessor.Mobile/bin/Release/net10.0-windows10.0.19041.0/win-x64/AppPackages" -Recurse -Filter "*.msixbundle" | Select-Object -First 1
          if ($msix -eq $null) {
            $msix = Get-ChildItem -Path "TransactionProcessor.Mobile/bin/Release/net10.0-windows10.0.19041.0/win-x64/AppPackages" -Recurse -Filter "*.msix" | Select-Object -First 1
          }
          if ($msix -eq $null) {
            Write-Error "No .msix or .msixbundle file found in AppPackages directory."
            exit 1
          }
          echo "MSIX_PATH=$($msix.FullName)" >> $env:GITHUB_ENV

      - name: Upload Windows app packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-packages
          path: TransactionProcessor.Mobile/bin/Release/net10.0-windows10.0.19041.0/win-x64/AppPackages/

      - name: Upload MSIX to release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.MSIX_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up certificate
        if: always()
        run: |
          Remove-Item -Force cert.pfx -ErrorAction SilentlyContinue
          Remove-Item -Force cert.pfx.asc -ErrorAction SilentlyContinue
        shell: powershell

  deploy_to_staging:
    needs: release_windows
    runs-on: [self-hosted, windows]
    permissions:
      contents: read
    steps:
      - name: Download Windows app packages artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-app-packages
          path: windows-app-packages

      - name: Copy Windows packages to AppUpdates
        shell: powershell
        run: |
          $dest = "C:\inetpub\wwwroot\AppUpdates\Windows"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "windows-app-packages\*" -Destination $dest -Recurse -Force
          Write-Host "Copied Windows app packages to $dest"
